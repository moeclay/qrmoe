<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>QRCode by Moe Donirez</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <!-- <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script> -->
  </head>
  <body
    class="bg-zinc-900 text-white min-h-screen flex flex-col items-center p-4"
  >
    <!-- Row 1: Header -->
    <header class="w-full max-w-lg text-left py-4">
      <h1 class="text-2xl font-bold text-pink-400 uppercase tracking-widest">
        Moe QRCode
      </h1>
      <p class="text-xs text-zinc-500 italic mt-1">
        scan &amp; validate qrcode
      </p>
    </header>

    <!-- Row 2: Camera & Buttons -->
    <main
      id="camfile"
      class="w-full max-w-lg flex flex-col md:flex-row gap-4 items-start justify-center"
    >
      <!-- Camera Feed -->
      <div
        class="relative w-full aspect-[4/3] bg-black rounded-xl overflow-hidden border-2 border-zinc-700 shadow-2xl"
      >
        <video
          id="video"
          class="w-full h-full object-cover"
          autoplay
          playsinline
        ></video>
        <canvas id="canvas" class="hidden"></canvas>
      </div>

      <!-- Controls (Vertical stack) -->
      <div class="flex md:flex-col gap-3 w-full md:w-auto">
        <!-- On/Off (Camera Toggle) -->
        <button
          id="btnAllow"
          class="flex-1 md:flex-none p-4 rounded-full bg-gray-600 transition-all shadow-lg flex items-center justify-center"
        >
          <svg
            id="power_24"
            width="24"
            height="24"
            viewBox="0 0 24 24"
            xmlns="http://www.w3.org/2000/svg"
            xmlns:xlink="http://www.w3.org/1999/xlink"
          >
            <rect
              width="24"
              height="24"
              stroke="none"
              fill="#000000"
              opacity="0"
            />

            <g transform="matrix(1 0 0 1 12 12)">
              <g style="">
                <g transform="matrix(1 0 0 1 0 0)">
                  <path
                    style="
                      stroke: none;
                      stroke-width: 2;
                      stroke-dasharray: none;
                      stroke-linecap: round;
                      stroke-dashoffset: 0;
                      stroke-linejoin: round;
                      stroke-miterlimit: 4;
                      fill: none;
                      fill-rule: nonzero;
                      opacity: 1;
                    "
                    transform=" translate(-12, -12)"
                    d="M 0 0 L 24 0 L 24 24 L 0 24 z"
                    stroke-linecap="round"
                  />
                </g>
                <g transform="matrix(1 0 0 1 0 0.84)">
                  <path
                    style="
                      stroke: rgb(33, 33, 33);
                      stroke-width: 2;
                      stroke-dasharray: none;
                      stroke-linecap: round;
                      stroke-dashoffset: 0;
                      stroke-linejoin: round;
                      stroke-miterlimit: 4;
                      fill: none;
                      fill-rule: nonzero;
                      opacity: 1;
                    "
                    transform=" translate(-12, -12.84)"
                    d="M 7 6 C 4.51403595882479 8.099149681682515 3.603936415933534 11.527579382088797 4.721502997904817 14.583310315103844 C 5.839069579876099 17.639041248118893 8.746317993392106 19.671359641163505 12.000000000000002 19.671359641163505 C 15.253682006607898 19.671359641163505 18.160930420123904 17.639041248118886 19.278497002095186 14.58331031510384 C 20.396063584066468 11.527579382088794 19.485964041175208 8.099149681682512 17 5.999999999999998"
                    stroke-linecap="round"
                  />
                </g>
                <g transform="matrix(1 0 0 1 0 -4)">
                  <line
                    style="
                      stroke: rgb(33, 33, 33);
                      stroke-width: 2;
                      stroke-dasharray: none;
                      stroke-linecap: round;
                      stroke-dashoffset: 0;
                      stroke-linejoin: round;
                      stroke-miterlimit: 4;
                      fill: none;
                      fill-rule: nonzero;
                      opacity: 1;
                    "
                    x1="0"
                    y1="-4"
                    x2="0"
                    y2="4"
                  />
                </g>
              </g>
            </g>
          </svg>
        </button>

        <!-- Camera Snapshot -->
        <button
          id="btnSnap"
          disabled
          class="flex-1 md:flex-none p-4 rounded-full bg-pink-500 hover:bg-pink-400 disabled:bg-zinc-700 transition-all shadow-lg flex items-center justify-center"
        >
          <svg
            class="w-6 h-6"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
            stroke-width="2"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"
            ></path>
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"
            ></path>
          </svg>
        </button>

        <!-- File Upload -->
        <button
          id="btnFile"
          onclick="document.getElementById('fileInput').click()"
          class="flex-1 md:flex-none p-4 rounded-full bg-emerald-600 hover:bg-emerald-500 transition-all shadow-lg flex items-center justify-center"
        >
          <svg
            class="w-6 h-6"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
            stroke-width="2"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"
            ></path>
          </svg>
        </button>

        <!-- Generate QR -->
        <button
          id="btnGenerate"
          class="flex-1 md:flex-none p-4 rounded-full bg-indigo-600 hover:bg-indigo-500 transition-all shadow-lg flex items-center justify-center"
        >
          <svg
            id="QR_Code_24"
            width="24"
            height="24"
            viewBox="0 0 24 24"
            xmlns="http://www.w3.org/2000/svg"
            xmlns:xlink="http://www.w3.org/1999/xlink"
          >
            <rect
              width="24"
              height="24"
              stroke="none"
              fill="#fff"
              opacity="0"
            />

            <g transform="matrix(1.11 0 0 1.11 12 12)">
              <path
                style="
                  stroke: none;
                  stroke-width: 1;
                  stroke-dasharray: none;
                  stroke-linecap: butt;
                  stroke-dashoffset: 0;
                  stroke-linejoin: miter;
                  stroke-miterlimit: 4;
                  fill: rgb(255, 255, 255);
                  fill-rule: nonzero;
                  opacity: 1;
                "
                transform=" translate(-12, -12)"
                d="M 4 3 C 3.448 3 3 3.448 3 4 L 3 8 C 3 8.552 3.448 9 4 9 L 8 9 C 8.552 9 9 8.552 9 8 L 9 4 C 9 3.448 8.552 3 8 3 L 4 3 z M 11 3 L 11 5 L 13 5 L 13 3 L 11 3 z M 16 3 C 15.448 3 15 3.448 15 4 L 15 8 C 15 8.552 15.448 9 16 9 L 20 9 C 20.552 9 21 8.552 21 8 L 21 4 C 21 3.448 20.552 3 20 3 L 16 3 z M 5 5 L 7 5 L 7 7 L 5 7 L 5 5 z M 17 5 L 19 5 L 19 7 L 17 7 L 17 5 z M 11 7 L 11 9 L 13 9 L 13 7 L 11 7 z M 3 11 L 3 13 L 5 13 L 5 11 L 3 11 z M 7 11 L 7 13 L 9 13 L 9 11 L 7 11 z M 11 11 L 11 13 L 13 13 L 13 11 L 11 11 z M 13 13 L 13 15 L 15 15 L 15 13 L 13 13 z M 15 13 L 17 13 L 17 11 L 15 11 L 15 13 z M 17 13 L 17 15 L 19 15 L 19 13 L 17 13 z M 19 13 L 21 13 L 21 11 L 19 11 L 19 13 z M 19 15 L 19 17 L 21 17 L 21 15 L 19 15 z M 19 17 L 17 17 L 17 19 L 19 19 L 19 17 z M 19 19 L 19 21 L 21 21 L 21 19 L 19 19 z M 17 19 L 15 19 L 15 21 L 17 21 L 17 19 z M 15 19 L 15 17 L 13 17 L 13 19 L 15 19 z M 13 19 L 11 19 L 11 21 L 13 21 L 13 19 z M 13 17 L 13 15 L 11 15 L 11 17 L 13 17 z M 15 17 L 17 17 L 17 15 L 15 15 L 15 17 z M 4 15 C 3.448 15 3 15.448 3 16 L 3 20 C 3 20.552 3.448 21 4 21 L 8 21 C 8.552 21 9 20.552 9 20 L 9 16 C 9 15.448 8.552 15 8 15 L 4 15 z M 5 17 L 7 17 L 7 19 L 5 19 L 5 17 z"
                stroke-linecap="round"
              />
            </g>
          </svg>
        </button>
      </div>
    </main>
    <input type="file" id="fileInput" accept="image/*" class="hidden" />

    <!-- Row 2: Generator QR -->
    <div id="qrgen" class="hidden w-full max-w-lg flex-col gap-4">
      <input
        type="text"
        id="genInput"
        placeholder="Masukkan teks/link"
        class="w-full p-4 rounded-lg bg-zinc-800 border border-zinc-700"
      />
      <div class="flex gap-2">
        <button
          onclick="generateQR()"
          class="w-1/2 p-4 bg-pink-600 rounded-lg font-bold"
        >
          Generate QRCode
        </button>
        <button
          id="backScan"
          class="w-1/2 p-4 bg-indigo-600 rounded-lg font-bold"
        >
          Scan QR
        </button>
      </div>

      <div id="result-container">
        <div id="qr-result"></div>
      </div>
    </div>

    <!-- Result Area -->
    <div
      id="resultArea"
      class="w-full max-w-lg mt-6 p-4 bg-zinc-800 rounded-lg border border-zinc-700"
    >
      <p class="text-emerald-400 font-mono break-all">
        Hasil: <br /><span id="result"></span>
      </p>
      <a
        id="linkBtn"
        href="#"
        target="_blank"
        class="hidden mt-3 inline-block px-4 py-2 bg-blue-600 rounded-lg text-white font-bold hover:bg-blue-500 transition-all"
      >
        Buka Link
      </a>
    </div>

    <script>
      let isCameraOn = false;
      const fileInput = document.getElementById("fileInput");
      const video = document.getElementById("video");
      const canvas = document.getElementById("canvas");
      const btnAllow = document.getElementById("btnAllow");
      const btnSnap = document.getElementById("btnSnap");
      const resultEl = document.getElementById("result");

      // frame
      const camfile = document.getElementById("camfile");
      const qrgen = document.getElementById("qrgen");

      // linkBtn
      const linkBtn = document.getElementById("linkBtn");
      const btnGenerate = document.getElementById("btnGenerate");
      const resultArea = document.getElementById("resultArea");
      const backScan = document.getElementById("backScan");

      // Fungsi untuk memproses hasil scan dan mendeteksi link
      function processResult(text) {
        console.log(text);
        resultEl.innerText = `${text}`;

        // Cek apakah teks adalah link (dimulai dengan http atau https)
        const urlPattern = /^(https?:\/\/)/i;

        if (urlPattern.test(text)) {
          linkBtn.href = text;
          linkBtn.classList.remove("hidden"); // Tampilkan tombol
        } else {
          linkBtn.classList.add("hidden"); // Sembunyikan jika bukan link
        }
      }

      // on off
      btnAllow.addEventListener("click", async () => {
        // reset result
        resultEl.innerText = "";
        linkBtn.classList.add("hidden");

        if (!isCameraOn) {
          try {
            const stream = await navigator.mediaDevices.getUserMedia({
              video: {
                facingMode: "environment",
                width: { ideal: 1280 },
                height: { ideal: 720 },
              },
            });
            video.srcObject = stream;
            isCameraOn = true;
            btnAllow.className =
              "flex-1 md:flex-none p-4 rounded-full bg-yellow-600 transition-all shadow-lg flex items-center justify-center";
            btnSnap.disabled = false;
          } catch (err) {
            alert("Gagal mengakses kamera: " + err.message);
          }
        } else {
          const stream = video.srcObject;
          const tracks = stream.getTracks();
          tracks.forEach((track) => track.stop());
          video.srcObject = null;
          isCameraOn = false;
          btnAllow.className =
            "flex-1 md:flex-none p-4 rounded-full bg-gray-600 transition-all shadow-lg flex items-center justify-center";
          btnSnap.disabled = true;
        }
      });

      // ... (Logic snap & File tetap sama)
      btnSnap.addEventListener("click", () => {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        const ctx = canvas.getContext("2d");
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        canvas.toBlob((blob) => {
          const file = new File([blob], "scan.png", { type: "image/png" });
          new Html5Qrcode("canvas")
            .scanFile(file, true)
            .then((text) => {
              resultEl.innerText = `${text}`;
              processResult(text);
            })
            .catch(() => (resultEl.innerText = "Barcode tidak ditemukan."));
        }, "image/png");
      });

      // upload file
      fileInput.addEventListener("change", (e) => {
        const file = e.target.files[0];
        if (!file) return;
        new Html5Qrcode("canvas")
          .scanFile(file, true)
          .then((text) => {
            resultEl.innerText = `${text}`;
            processResult(text);
          })
          .catch(() => (resultEl.innerText = "Barcode tidak ditemukan."));
      });

      // click generate
      btnGenerate.addEventListener("click", async () => {
        // 1. Sembunyikan kontainer kamera/file
        camfile.classList.add("hidden");
        resultArea.classList.add("hidden");
        linkBtn.classList.remove("hidden");

        // 2. Tampilkan kontainer generator
        qrgen.classList.remove("hidden");
        qrgen.classList.add("flex"); // Mengembalikan layout flex
      });

      backScan.addEventListener("click", async () => {
        // 1. Sembunyikan kontainer kamera/file
        camfile.classList.remove("hidden");
        resultArea.classList.remove("hidden");
        linkBtn.classList.add("hidden");

        // 2. Tampilkan kontainer generator
        qrgen.classList.add("hidden");
        qrgen.classList.remove("flex"); // Mengembalikan layout flex
      });

      // function generate qrcode
      function generateQR() {
        // 1. Ambil nilai teks dari input box
        const infoText = document.getElementById("genInput").value.trim();
        const qrResultDiv = document.getElementById("qr-result");

        // 2. Validasi: Jika input kosong, beri peringatan
        if (infoText === "") {
          alert("Silakan masukkan teks atau URL terlebih dahulu!");
          return;
        }

        // 3. Buat URL API dengan teks yang sudah di-encode agar aman untuk URL
        const size = "200x200"; // Anda bisa mengubah ukurannya di sini
        const apiUrl = `https://api.qrserver.com/v1/create-qr-code/?size=${size}&data=${encodeURIComponent(infoText)}`;

        // 4. Masukkan tag <img> ke dalam container hasil
        qrResultDiv.innerHTML = `
        <div style="margin-top: 15px; text-align: left;">
            <img src="${apiUrl}" alt="QR Code" style="border: 4px solid #fff; border-radius: 4px;" />
            <br>
            <small style="color: #aaa; display: block; margin-top: 5px;">QR Code untuk: ${infoText}</small>
        </div>
        `;
      }
    </script>
  </body>
</html>
